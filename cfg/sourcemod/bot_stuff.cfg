// bot_stuff 插件配置文件
// 该文件由插件自动生成，位于 cfg/sourcemod/bot_stuff.cfg
// 修改后需要重新加载插件或重启服务器才能生效

// ==================== 基础开关设置 ====================

// 启用专业BOT（ProBOT）
sm_bot_stuff_enable_pro_bots "1"

// 启用顶级BOT（TopBOT）  
sm_bot_stuff_enable_top_bots "1"

// 增强普通BOT
sm_bot_stuff_enhance_normal_bots "1"

// ==================== 爆头率设置 ====================

// TopBOT基础爆头率 (0-100, 默认80)
sm_bot_stuff_top_bot_headshot_rate "70"

// ProBOT基础爆头率 (0-100, 默认70)
sm_bot_stuff_pro_bot_headshot_rate "60"

// 普通BOT基础爆头率 (0-100, 默认60)
sm_bot_stuff_normal_bot_headshot_rate "50"

// 狙击枪爆头率倍率 (0.5-2.0, 默认0.6)
sm_bot_stuff_sniper_headshot_mult "0.6"

// 步枪爆头率倍率 (0.5-2.0, 默认1.0)
sm_bot_stuff_rifle_headshot_mult "1.0"

// 冲锋枪爆头率倍率 (0.5-2.0, 默认0.8)
sm_bot_stuff_smg_headshot_mult "0.8"

// 手枪爆头率倍率 (0.3-1.5, 默认1.2)
sm_bot_stuff_pistol_headshot_mult "1.0"

// ==================== 瞄准模式设置 ====================

// 瞄准模式: 0=混合模式, 1=只瞄准头部, 2=只瞄准身体
sm_bot_stuff_aim_mode "0"

// 霰弹枪瞄准模式: 0=头部, 1=身体
sm_bot_stuff_shotgun_aim_body "1"

// ==================== 距离相关设置 ====================

// 近距离阈值 (0-2000, 默认500.0)
sm_bot_stuff_close_range "500.0"

// 中距离阈值 (0-2000, 默认1000.0)
sm_bot_stuff_medium_range "1000.0"

// 近距离爆头加成 (0-50, 默认20)
sm_bot_stuff_close_range_headshot_bonus "20"

// 远距离爆头惩罚 (0-50, 默认15)
sm_bot_stuff_long_range_headshot_penalty "15"

// ==================== TopBOT 设置 ====================

// TopBOT 反应时间 (0.0-0.5, 默认0.0)
sm_bot_stuff_top_bot_reaction_time "0.1"

// TopBOT 攻击性 (0.0-1.0, 默认1.0)
sm_bot_stuff_top_bot_aggression "1.0"

// TopBOT 视角最大加速度 (10000-50000, 默认25000)
sm_bot_stuff_top_bot_view_accel "25000"

// ==================== ProBOT 设置 ====================

// ProBOT 最小反应时间 (0.0-0.5, 默认0.1)
sm_bot_stuff_pro_bot_reaction_time_min "0.125"

// ProBOT 最大反应时间 (0.0-0.5, 默认0.3)
sm_bot_stuff_pro_bot_reaction_time_max "0.325"

// ProBOT 最小攻击性 (0.0-1.0, 默认0.0)
sm_bot_stuff_pro_bot_aggression_min "0.0"

// ProBOT 最大攻击性 (0.0-1.0, 默认1.0)
sm_bot_stuff_pro_bot_aggression_max "1.0"

// ProBOT 视角最大加速度最小值 (10000-50000, 默认4000)
sm_bot_stuff_pro_bot_view_accel_min "4000"

// ProBOT 视角最大加速度最大值 (10000-50000, 默认7000)
sm_bot_stuff_pro_bot_view_accel_max "7000"

// ==================== 高级设置 ====================

// 瞄准容差 (0.1-1.0, 默认0.3)
sm_bot_stuff_aim_tolerance "0.3"



// 目标追踪速度 (0.1-2.0, 默认1.0)
sm_bot_stuff_target_track_speed "1.0"

// 预测瞄准开关 (0-1, 默认1)
sm_bot_stuff_predictive_aiming "1"

// ==================== TopBOT 自定义名单设置 ====================

// 自定义TopBOT名单开关 (0-1, 默认0) - 启用后将使用自定义名单，禁用默认名单
sm_bot_stuff_custom_topbot_enabled "0"

// 自定义TopBOT名单 (用逗号分隔，最多支持20个名字)
// 例如: "s1mple,ZywOo,NiKo,sh1ro,jL,donk,m0NESY"
sm_bot_stuff_custom_topbot_names "s1mple,ZywOo,NiKo,sh1ro,jL,donk,m0NESY"