// RankMe Kento Edition - Configuration File
// This file contains all the configuration options for the RankMe plugin
// Lines starting with // are comments and will be ignored by the plugin

// ========== BASIC SETTINGS ==========

// Enable the plugin? 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_enabled "1"

// Enable debug logging? 1 = true 0 = false
// - Enable detailed logging for troubleshooting
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_debug_log "0"

// Auto-Purge inactive players? X = Days  0 = Off
// - Automatically remove players who haven't played for X days
// -
// Default: "0"
// Minimum: "0.000000"
rankme_autopurge "0"

// The name of the table that will be used. (Max: 100)
// -
// Default: "rankme"
rankme_sql_table "rankme"

// Rank players by? 0 = STEAM:ID 1 = Name 2 = IP
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "2.000000"
rankme_rank_by "0"

// Rank by what? 1 = by points 2 = by KDR 
// -
// Default: "1"
// Minimum: "1.000000"
// Maximum: "2.000000"
rankme_rank_mode "1"

// Starting points
// -
// Default: "1000"
// Minimum: "0.000000"
rankme_points_start "1000"

// Minimum points
// -
// Default: "0"
// Minimum: "0.000000"
rankme_points_min "1"

// Is minimum points enabled? 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_points_min_enabled "1"

// ========== ELO SYSTEM SETTINGS ==========

// Use ELO rating system? 1 = true 0 = false
// - Enable ELO rating system for dynamic skill-based ranking
// - When enabled, uses ELO algorithm instead of simple point accumulation
// - BOT players use the same ELO calculation as human players
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_use_elo_system "1"

// Starting score for ELO system
// - Initial ELO rating for new players
// - All players (including BOTs) start with this score
// -
// Default: "1000"
// Minimum: "1.000000"
rankme_elo_start_score "1000"

// ELO K-Factor (Base value)
// - Base K-factor for ELO rating system. Higher values = more volatile rankings
// - This value scales dynamically based on player skill level
// -
// Default: "24"
// Minimum: "1.000000"
rankme_elo_k_factor "24"

// ELO K-Factor for low ranks (Silver I-III)
// -
// Default: "32"
// Minimum: "1.000000"
rankme_elo_k_low "32"

// ELO K-Factor for mid-low ranks (Silver IV-Elite)
// -
// Default: "24"
// Minimum: "1.000000"
rankme_elo_k_mid_low "24"

// ELO K-Factor for mid ranks (Gold Nova I-IV)
// -
// Default: "16"
// Minimum: "1.000000"
rankme_elo_k_mid "16"

// ELO K-Factor for high ranks (MG I-DMG)
// -
// Default: "12"
// Minimum: "1.000000"
rankme_elo_k_high "12"

// ELO K-Factor for professional ranks (LE+)
// -
// Default: "8"
// Minimum: "1.000000"
rankme_elo_k_pro "8"

// Enable ELO system debug logging? 1 = true 0 = false
// - When enabled, detailed ELO calculation logs will be output to server console
// - Useful for debugging ELO rating changes and system behavior
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_elo_debug_log "0"

// ========== ANNOUNCEMENT SETTINGS ==========

// Enable chat announcements? 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_changes_chat "0"

// Announce player connect? 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announcer_player_connect "1"

// Announce player connect in chat? 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announcer_player_connect_chat "1"

// Announce player connect at hintbox? 1 = true 0 = false
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announcer_player_connect_hint "0"

// Announce player disconnect with position and points? 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announcer_player_disconnect "1"

// Announce top player connect? 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announcer_top_player_connect "1"

// Announce when a top player connect at chat? 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announcer_top_player_connect_chat "1"

// Announce when a top player connect at hintbox? 1 = true 0 = false
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announcer_top_player_connect_hint "0"

// Max position to announce that a top player connect?
// -
// Default: "10"
// Minimum: "0.000000"
rankme_announcer_top_pos_player_connect "10"

// Announce kill streaks globally? 1 = true 0 = false
// - When enabled, kill streaks (Double Kill, Triple Kill, etc.) will be announced to all players
// - When disabled, only the player getting the streak will see the announcement
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announce_kill_streak_global "1"

// Announce revenge kills globally? 1 = true 0 = false
// - When enabled, revenge kills will be announced to all players
// - When disabled, only the players involved will see the revenge messages
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announce_revenge_global "1"

// Announce first blood to all players globally? 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_announce_first_blood_global "1"

// ========== ADVANCED SETTINGS ==========



// ========== BOT SETTINGS ==========

// Rank bots? 1 = true 0 = false
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_rankbots "1"

// Show bots on rank/top/etc? 1 = true 0 = false
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_show_bots_on_rank "1"

// ========== POINTS SETTINGS ==========

// How many points a player got for a kill?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_kill "1"

// How many points a player lost for a death?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_death "1"

// How many points a player got for a suicide?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_suicide "1"

// How many points a player got for a teamkill?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_tk "1"

// How many points a player lose for Team Killing?
// -
// Default: "0"
// Minimum: "0.000000"
rankme_points_lose_tk "0"

// How many points a player lose for Assist Team Killing?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_lose_atk "1"

// How many points a player lose for Suiciding?
// -
// Default: "0"
// Minimum: "0.000000"
rankme_points_lose_suicide "0"

// How many points a player got for a headshot?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_hs "1"

// How many points a player got for a knife kill?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_knife "2"

// How many points a player got for planting the bomb?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_c4_planted "2"

// How many points a player got for exploding the bomb?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_c4_exploded "2"

// How many points a player got for defusing the bomb?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_c4_defused "2"

// How many points a player gets for assist kill?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_assist_kill "1"

// How many points a player gets for assist flash kill?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_assist_flash "1"

// How many points a player lose for team assist flash kill?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_lose_atf "1"

// How many points a player got for being the MVP?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_mvp "1"

// How many points CT got for winning the round?
// -
// Default: "0"
// Minimum: "0.000000"
rankme_points_ct_round_win "0"

// How many points CT lost for losing the round?
// -
// Default: "0"
// Minimum: "0.000000"
rankme_points_ct_round_lose "0"

// How many points TR got for winning the round?
// -
// Default: "0"
// Minimum: "0.000000"
rankme_points_tr_round_win "0"

// How many points TR lost for losing the round?
// -
// Default: "0"
// Minimum: "0.000000"
rankme_points_tr_round_lose "0"

// How many points a player got for first blood?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_first_blood "2"

// How many additional points a player got for a no scope kill?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_ns "1"

// 0: ssg08 and awp only, 1: ssg08, awp, g3sg1, scar20
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_points_ns_allsnipers "0"

// How many additional points a player got for killing through smoke?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_smoke "1"

// How many additional points a player got for wallbang?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_wall "1"

// How many points the VIP got for escaping?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_vip_escaped_player "2"

// How many points CTs got helping the VIP to escaping?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_vip_escaped_team "2"

// How many points the TR who killed the VIP got additional?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_vip_killed_player "2"

// How many points TRs got for killing the VIP?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_vip_killed_team "2"

// How many points CT got for winning the match?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_match_win "2"

// How many points CT lost for losing the match?
// -
// Default: "2"
// Minimum: "0.000000"
rankme_points_match_lose "2"

// How many points a player got for a draw?
// -
// Default: "1"
// Minimum: "0.000000"
rankme_points_match_draw "1"

// Multiplier of points by taser
// -
// Default: "2.0"
// Minimum: "0.000000"
rankme_points_taser_multiplier "2.0"

// ========== VIP SETTINGS ==========

// Show AS_ maps statiscs (VIP mod) on statsme and session?
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_vip_enabled "0"

// ========== DISPLAY SETTINGS ==========

// When rank command is used, show for all the rank of the player? 1 = true 0 = false
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_show_rank_all "0"

// Cooldown timer to prevent rank command spam.
// 0.0 = disabled
// -
// Default: "30.0"
// Minimum: "0.000000"
rankme_rank_all_timer "30.0"

// Get player rank via cache, auto build cache on every OnMapStart.
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_rank_cache "0"

// Allow player to reset his own rank? 1 = true 0 = false
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_resetownrank "0"

// Minimum players to start giving points
// -
// Default: "2"
// Minimum: "0.000000"
rankme_minimum_players "1"

// Days to not show on rank
// -
// Default: "0"
// Minimum: "0.000000"
rankme_days_to_not_show_on_rank "0"

// Gather Statistics In Warmup?
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_gather_stats_warmup "0"

// ========== ADMIN SETTINGS ==========

// Announce admin flag (Empty = disabled)
// - Admin flag to disable announce. blank = disabled
// -
// Default: ""
rankme_announce_admin ""

// ========== HUD SETTINGS ==========

// HUD Type: 0 = Disabled, 1 = Overlay, 2 = Text
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "2.000000"
rankme_hud_type "1"

// Overlay display time (seconds)
// -
// Default: "3.0"
// Minimum: "0.000000"
rankme_overlay_time "3.0"

// ========== MISC SETTINGS ==========

// Enable (non-command) chat triggers. (e.g: rank, statsme, top) Recommended to be set to 0 when running with EventScripts for avoiding double responses. 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_chat_triggers "1"

// Free-For-All (FFA) mode? 1 = true 0 = false
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_ffa "0"

// Using MySQL? 1 = true 0 = false (SQLite)
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_mysql "1"

// Dump the Database to SQL file? (required to be 1 if using the web interface and SQLite, case MySQL, it won't be dumped) 1 = true 0 = false
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_dump_db "0"

// Gather Statistics (a.k.a count points)? (turning this off won't disallow to see the stats already gathered) 1 = true 0 = false
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
rankme_gather_stats "1"
